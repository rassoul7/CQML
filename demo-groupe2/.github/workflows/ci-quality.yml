name: " Pipeline Qualité — Groupe 2 (GHA + PMD + SonarQube)"

on:
  push:
    branches: [ "main", "demo-**" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ────────────────────────────────────────────
  # JOB 1 — ANALYSE STATIQUE PMD
  # ────────────────────────────────────────────
  analyse-pmd:
    name: " Analyse PMD (Groupe 1)"
    runs-on: ubuntu-latest

    steps:
      - name: " Checkout du code"
        uses: actions/checkout@v4

      - name: " Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: " Analyse PMD — Détection des violations"
        run: mvn pmd:check --no-transfer-progress
        #  Si des violations sont détectées → le build FAIL ici
        # Le job SonarQube ne sera JAMAIS lancé → déploiement BLOQUÉ

      - name: "📋 Upload rapport PMD"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-pmd
          path: target/pmd.xml

  # ────────────────────────────────────────────
  # JOB 2 — SCAN SONARQUBE
  # ────────────────────────────────────────────
  scan-sonarqube:
    name: " Scan SonarQube (Groupe 4)"
    runs-on: ubuntu-latest
    needs: analyse-pmd   # ← Dépend de PMD : si PMD fail, on n'arrive jamais ici

    steps:
      - name: " Checkout du code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud a besoin de tout l'historique Git

      - name: "☕ Setup Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: " Build du projet"
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: " Scan SonarCloud + Quality Gate"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true \
            --no-transfer-progress
        #  qualitygate.wait=true → bloque le pipeline jusqu'au résultat du Quality Gate

  # ────────────────────────────────────────────
  # JOB 3 — DÉPLOIEMENT CD (seulement si tout )
  # ────────────────────────────────────────────
  deploiement:
    name: " Déploiement CD"
    runs-on: ubuntu-latest
    needs: [ analyse-pmd, scan-sonarqube ]   # ← Les DEUX doivent passer

    steps:
      - name: " Checkout du code"
        uses: actions/checkout@v4

      - name: " Déploiement simulé"
        run: |
          echo "════════════════════════════════════════"
          echo " PMD     : AUCUNE VIOLATION DÉTECTÉE"
          echo " SONAR   : QUALITY GATE PASSED"
          echo " DÉPLOIEMENT EN PRODUCTION..."
          echo "════════════════════════════════════════"
          echo "Version : $(date +'%Y%m%d-%H%M%S')"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "────────────────────────────────────────"
          echo " APPLICATION DÉPLOYÉE AVEC SUCCÈS !"
          echo "════════════════════════════════════════"
